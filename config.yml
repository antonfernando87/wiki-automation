# wiki-automation personal configuration
# ──────────────────────────────────────────────────────────────────────────────
# This file lets you personalise which repositories are scanned and which
# automated summaries run on schedule.
# All settings are optional — defaults are noted inline.
# ──────────────────────────────────────────────────────────────────────────────

# ── Scheduled-run toggles ─────────────────────────────────────────────────────
# Set to false to prevent the scheduled (cron) run from executing.
# Manual workflow_dispatch runs are NEVER blocked by these flags.
# Default: true (all summaries run on schedule).
enable_daily:   true
enable_weekly:  true
enable_monthly: true

# Repositories to explicitly track.
# Accepts "owner/name" or bare "name".
# If non-empty, ONLY these repos are scanned for commits and branch work.
# Leave as [] (or omit the key) to auto-scan all your repos.
#
# Example:
#   track_repos:
#     - AntonMFernando-NOAA/global-workflow
#     - AntonMFernando-NOAA/ufs-weather-model
track_repos:
    - wiki-automation

# Repositories to ignore entirely (by bare name or "owner/name").
# Useful to exclude forks, mirrors, or noise repos.
#
# Example:
#   ignore_repos:
#     - test-automation
#     - some-fork
ignore_repos:
  - AntonMFernando-NOAA/wiki-automation

# ── Summary style ─────────────────────────────────────────────────────────────
# Controls how the AI-generated work summary is written.
#   narrative (default) : a concise prose paragraph
#   bullets             : a bullet-point list
# summary_word_limit   : max words when style is "narrative" (default: 130)
# summary_bullet_count : number of bullet points when style is "bullets" (default: 5)
#
# These are shared defaults used for all three summary types unless a
# per-type key is set below.
summary_style: narrative
summary_word_limit: 130
summary_bullet_count: 5

# ── Per-type overrides (optional) ─────────────────────────────────────────────
# Uncomment and set any key to override the shared defaults above for that
# specific summary type only. Omitted keys fall back to the shared defaults.
#
# daily_summary_style: narrative
# daily_summary_word_limit: 100
# daily_summary_bullet_count: 4
#
# weekly_summary_style: narrative
# weekly_summary_word_limit: 200
# weekly_summary_bullet_count: 6
#
# monthly_summary_style: narrative
# monthly_summary_word_limit: 300
# monthly_summary_bullet_count: 8
