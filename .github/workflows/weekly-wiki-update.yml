name: Weekly Wiki Update

on:
  schedule:
    - cron: '59 23 * * 5'         # Every Friday at 23:59 UTC
  workflow_dispatch:
    inputs:
      week_start:
        description: 'Any date within the week to summarise (YYYY-MM-DD)'
        required: false
        default: ''
      summary_style:
        description: 'Summary style'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - narrative
          - bullets
      summary_word_limit:
        description: 'Max words for narrative (e.g. 130)'
        required: false
        default: ''
      summary_bullet_count:
        description: 'Number of bullet points (e.g. 5)'
        required: false
        default: ''

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Generate weekly summary
        env:
          GH_TOKEN: ${{ secrets.WIKI_PAT }}
          GITHUB_ACTOR: ${{ vars.GITHUB_ACTOR || github.repository_owner }}
          WEEK_START: ${{ inputs.week_start }}
          SUMMARY_STYLE: ${{ inputs.summary_style }}
          SUMMARY_WORD_LIMIT: ${{ inputs.summary_word_limit }}
          SUMMARY_BULLET_COUNT: ${{ inputs.summary_bullet_count }}
        run: python generate_weekly_summary.py

      - name: Push to wiki
        env:
          WIKI_PAT: ${{ secrets.WIKI_PAT }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${WIKI_PAT}@github.com/${REPO}.wiki.git wiki
          cd wiki

          if [ ! -f Weekly-Updates.md ]; then
            printf '# Weekly Updates\n\nWeekly narrative summaries of work activity.\n\n---\n\n' > Weekly-Updates.md
          fi

          # Insert entry at the correct chronological position (newest first)
          python3 ../dedup_wiki.py ../weekly_summary_patch.md Weekly-Updates.md

          if ! grep -q 'Weekly-Updates' _Sidebar.md 2>/dev/null; then
            printf '\n* [[Weekly Updates|Weekly-Updates]]\n' >> _Sidebar.md
          fi

          git add Weekly-Updates.md _Sidebar.md
          git diff --cached --quiet \
            || (git commit -m "Weekly wiki update: $(date -u +%Y-%m-%d)" && git push)

      - name: Commit repo changes
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git
          git add -A
          git diff --cached --quiet \
            || git commit -m "chore: auto-update repo files [$(date -u +%Y-%m-%d)]" \
            && git push origin HEAD
