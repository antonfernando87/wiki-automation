name: Weekly Wiki Update

on:
  schedule:
    - cron: '59 19 * * 5'         # Every Friday at 19:59 UTC
  workflow_dispatch:
    inputs:
      week_start:
        description: 'Monday date of the week to summarise (YYYY-MM-DD). Defaults to last Monday.'
        required: false
        default: ''

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate weekly summary
        env:
          GH_TOKEN: ${{ secrets.WIKI_PAT }}
          GITHUB_ACTOR: ${{ vars.GITHUB_ACTOR || github.repository_owner }}
          WEEK_START: ${{ inputs.week_start }}
        run: python generate_weekly_summary.py

      - name: Push to wiki
        env:
          WIKI_PAT: ${{ secrets.WIKI_PAT }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${WIKI_PAT}@github.com/${REPO}.wiki.git wiki
          cd wiki

          if [ ! -f Weekly-Updates.md ]; then
            printf '# Weekly Updates\n\nWeekly narrative summaries of work activity.\n\n---\n\n' > Weekly-Updates.md
          fi

          cat ../weekly_summary_patch.md Weekly-Updates.md > tmp.md
          mv tmp.md Weekly-Updates.md

          if ! grep -q 'Weekly-Updates' _Sidebar.md 2>/dev/null; then
            printf '\n* [[Weekly Updates|Weekly-Updates]]\n' >> _Sidebar.md
          fi

          git add Weekly-Updates.md _Sidebar.md
          git diff --cached --quiet \
            || git commit -m "Weekly wiki update: $(date -u +%Y-%m-%d)" \
            && git push
