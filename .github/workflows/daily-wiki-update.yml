name: Daily Wiki Update

on:
  schedule:
    - cron: '59 23 * * 1-5'       # 23:59 UTC Mon-Fri
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to summarise (YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout scripts
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate daily summary
        env:
          GH_TOKEN: ${{ secrets.WIKI_PAT }}
          GITHUB_ACTOR: ${{ vars.GITHUB_ACTOR || github.repository_owner }}
          SUMMARY_DATE: ${{ inputs.date }}
        run: python generate_daily_summary.py

      - name: Push to wiki
        env:
          WIKI_PAT: ${{ secrets.WIKI_PAT }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${WIKI_PAT}@github.com/${REPO}.wiki.git wiki
          cd wiki

          if [ ! -f Daily-Updates.md ]; then
            printf '# Daily Updates\n\nAutomatically generated daily activity summaries.\n\n---\n\n' \
              > Daily-Updates.md
          fi

          # Remove existing entry for this date (avoids duplicates on re-runs)
          python3 ../dedup_wiki.py ../daily_summary_patch.md Daily-Updates.md

          cat ../daily_summary_patch.md Daily-Updates.md > tmp_updates.md
          mv tmp_updates.md Daily-Updates.md

          if ! grep -q 'Daily-Updates' _Sidebar.md; then
            printf '\n* [[Daily Updates|Daily-Updates]]\n' >> _Sidebar.md
          fi

          git add Daily-Updates.md _Sidebar.md
          git diff --cached --quiet \
            || (git commit -m "Daily wiki update: $(date -u +%Y-%m-%d)" && git push)
